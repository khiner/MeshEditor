  # Position and the point-domain color used by line/point meshes.
  # Derived normals live in the base-normal mirrors and posed scratch buffers.
  # Triangle-mesh tangent/color/UV attributes live in per-corner arenas.
  - name: Vertex
    fields:
      - name: Position
        type: vec3
      - name: Color
        type: vec4
  - name: BoneDeformVertex
    fields:
      - name: Joints
        type: uvec4
      - name: Weights
        type: vec4
  - name: MorphTargetVertex
    fields:
      - name: PositionDelta
        type: vec3
      - name: NormalDelta
        type: vec3
  - name: Transform
    fields:
      - name: P
        type: vec3
      - name: R
        type: quat
        default: "1, 0, 0, 0"
      - name: S
        type: vec3
        default: "1, 1, 1"
  # Local-space bounds. Defaults to empty (Min > Max), which readers treat as always-visible.
  - name: AABB
    fields:
      - name: Min
        type: vec3
        default: FloatMax
      - name: Max
        type: vec3
        default: -FloatMax
  - name: PunctualLight
