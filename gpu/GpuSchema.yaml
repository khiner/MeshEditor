    push_constant: true
    fields:
      - name: CommandsSlot
        type: u32
      - name: CullEntrySlot
        type: u32
      - name: DrawDataSlot
        type: u32
      - name: VisibleIndexSlot
        type: u32
      - name: BoundsSlot
        type: u32
      - name: ModelSlot
        type: u32
      - name: EntryCount
        type: u32
      - name: CommandCount
        type: u32
      # 0 zeroes both command regions' counts. 1 fills region A (frustum-passing, visibility-gated
      # when VisibilitySlot is set). 2 fills region B (occlusion-tested remainder) and updates visibility.
      - name: Phase
        type: u32
      - name: VisibilitySlot
        type: u32
        default: InvalidSlot
      - name: PyramidSamplerSlot
        type: u32
        default: InvalidSlot
  # Push constants shared by the pose pre-pass, the bounds reduce, and the bounds combine.
  # Posed-buffer slots come from SceneViewUBO.
  - name: BoundsReducePushConstants
    push_constant: true
    fields:
      # Vertex-state slot for the pose pre-pass's selected-vertex pending-transform check.
      - name: VertexStateSlot
        type: u32
        default: InvalidSlot
      - name: DrawDataSlot
        type: u32
      - name: BoundsSlot
        type: u32
      - name: TileMapSlot
        type: u32
      - name: PartialBoundsSlot
        type: u32
      - name: EntryFirstTileSlot
        type: u32
  # One workgroup per 256-element tile of a derive entry, in two phases.
  # Phase 0 derives face normals over the tile map's leading face-tile prefix.
  # Phase 1 gathers vertex and seam normals over the remaining tiles, reading phase 0 through FaceNormalSlot.
  # FirstTile locates the dispatch's tile range.
  # The position and output-buffer slots are per dispatch, targeting posed scratch or the base normal stores.
  - name: NormalDerivePushConstants
    push_constant: true
    fields:
      - name: EntriesSlot
        type: u32
      - name: AdjacencySlot
        type: u32
      - name: TileMapSlot
        type: u32
      - name: FirstTile
        type: u32
      - name: Phase
        type: u32
      - name: FaceFirstTriangleSlot
        type: u32
      - name: PositionSlot
        type: u32
      - name: VertexNormalSlot
        type: u32
      - name: SeamNormalSlot
        type: u32
      - name: FaceNormalSlot
        type: u32
  # Bounding-box wireframes: one instanced line draw over the listed instance-arena slots.
  - name: BoundsBoxPushConstants
    push_constant: true
    fields:
      - name: SlotsSlot
        type: u32
      - name: BoundsSlot
        type: u32
      - name: ModelSlot
        type: u32
      - name: StateSlot
        type: u32
  - name: SilhouetteEdgeDepthObjectPushConstants
    push_constant: true
    fields:
      - name: SilhouetteSamplerIndex
        type: u32
  # MotionScale.y is negative, which un-inverts the next-motion the velocity pass stores backward.
  - name: MotionBlurTilesFlattenPushConstants
    push_constant: true
    fields:
      - name: VelocitySamplerSlot
        type: u32
        default: InvalidSlot
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
      - name: MotionScale
        type: vec2
  - name: MotionBlurTilesDilatePushConstants
    push_constant: true
    fields:
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
  - name: MotionBlurGatherPushConstants
    push_constant: true
    fields:
      - name: DepthSamplerSlot
        type: u32
        default: InvalidSlot
      - name: VelocitySamplerSlot
        type: u32
        default: InvalidSlot
      - name: ColorSamplerSlot
        type: u32
        default: InvalidSlot
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
      - name: MotionScale
        type: vec2
      - name: DepthScale
        type: float
      - name: NoiseOffset
        type: float
  - name: UpdateSelectionStatePushConstants
    push_constant: true
    fields:
      - name: BitsetSlot
