bindings:
  # Dynamic: motion blur binds a per-step instance of the view UBO by dynamic offset.
  - name: SceneViewUBO
    kind: UniformDynamic
  - name: ViewportThemeUBO
    kind: Uniform
  - name: WorkspaceLightsUBO
    kind: Uniform
  - name: Image
    kind: Image
  - name: Sampler
    kind: Sampler
  - name: CubeSampler
    kind: Sampler
  - name: VertexBuffer
    kind: Buffer
  - name: IndexBuffer
    kind: Buffer
  - name: ModelBuffer
    kind: Buffer
  - name: Buffer
    kind: Buffer
  - name: ObjectIdBuffer
    kind: Buffer
  - name: DrawDataBuffer
    kind: Buffer
  - name: InstanceStateBuffer
    kind: Buffer
  - name: BoneDeformBuffer
    kind: Buffer
  - name: ArmatureDeformBuffer
    kind: Buffer
  - name: MorphTargetBuffer
    kind: Buffer
  - name: MorphWeightBuffer
    kind: Buffer
  - name: VertexClassBuffer
    kind: Buffer
  - name: LightBuffer
    kind: Buffer
  - name: MaterialBuffer
    kind: Buffer
  - name: PrimitiveMaterialBuffer
    kind: Buffer
  - name: FacePrimitiveBuffer
    kind: Buffer

enums:
  - name: MaterialAlphaMode
    type: u32
    values:
      - name: Opaque
      - name: Mask
      - name: Blend
  - name: PunctualLightType
    type: u32
    values:
      - name: Directional
      - name: Point
      - name: Spot
  - name: InteractionMode
    type: u32
    values:
      - name: Object
      - name: Edit
      - name: Excite
      - name: Pose
        value: 3
  - name: Element
    type: u32
    values:
      - name: None
        value: 0
      - name: Vertex
        value: 1
      - name: Edge
        value: 2
      - name: Face
        value: 4
  - name: DebugChannel
    type: u32
    values:
      - name: None
      - name: UvCoords0
      - name: UvCoords1
      - name: NormalTexture
      - name: NormalGeometry
      - name: Tangent
      - name: Bitangent
      - name: TangentW
      - name: NormalShading
      - name: Alpha
      - name: Occlusion
      - name: Emissive
      - name: BaseColor
      - name: Metallic
      - name: Roughness
      - name: ClearcoatFactor
      - name: ClearcoatRoughness
      - name: ClearcoatNormal
      - name: SheenColor
      - name: SheenRoughness
      - name: SpecularFactor
      - name: SpecularColor
      - name: TransmissionFactor
      - name: VolumeThickness
      - name: DiffuseTransmissionFactor
      - name: DiffuseTransmissionColor
      - name: IridescenceFactor
      - name: IridescenceThickness
      - name: AnisotropyStrength
      - name: AnisotropyDirection
  # Flag bits carried in CullEntry::Cmd's high bits. KeepOrder entries always draw, at their
  # original visible-index slot, so order-dependent (blended) batches stay deterministic.
  - name: CullFlag
    type: u32
    values:
      - name: KeepOrder
        value: 0x80000000u
structs:
  - name: SlotOffset
    fields:
      - name: Slot
        type: u32
        default: InvalidSlot
      - name: Offset
        type: u32
  - name: DrawData
    fields:
      - name: VertexSlot
        type: u32
        default: InvalidSlot
      - name: IndexSlotOffset
        type: SlotOffset
      - name: ModelSlot
        type: u32
        default: InvalidSlot
      - name: FirstInstance
        type: u32
      - name: ObjectIdSlot
        type: u32
        default: InvalidSlot
      - name: FaceFirstTriOffset
        type: u32
        default: InvalidOffset
      - name: FaceIdOffset
        type: u32
      - name: VertexCountOrHeadImageSlot
        type: u32
      - name: ElementIdOffset
        type: u32
      - name: ElementStateSlotOffset
        type: SlotOffset
      - name: InstanceStateSlot
        type: u32
        default: InvalidSlot
      - name: HasPendingVertexTransform
        type: u32
      - name: PrimaryEditInstanceIndex
        type: u32
        default: InvalidOffset
      - name: VertexOffset
        type: u32
      - name: BoneDeformOffset
        type: u32
        default: InvalidOffset
      - name: ArmatureDeformOffset
        type: u32
        default: InvalidOffset
      - name: MorphDeformOffset
        type: u32
        default: InvalidOffset
      - name: MorphWeightsOffset
        type: u32
        default: InvalidOffset
      - name: MorphTargetCount
        type: u32
      - name: VertexClassOffset
        type: u32
        default: InvalidOffset
      - name: PrimitiveMaterialOffset
        type: u32
        default: InvalidOffset
      - name: FacePrimitiveOffset
        type: u32
        default: InvalidOffset
  # One entry per draw-list DrawData element, for the frustum cull pass. Cmd is the entry's indirect
  # command index, with CullFlag bits in its high bits. Base is the absolute draw-list index of the
  # command's first entry, where its visible-index remap region begins.
  - name: CullEntry
    fields:
      - name: Cmd
        type: u32
      - name: Base
        type: u32
  - name: IblSamplers
    fields:
      - name: DiffuseEnvSamplerSlot
        type: u32
      - name: SpecularEnvSamplerSlot
        type: u32
      - name: BrdfLutSamplerSlot
        type: u32
      - name: SpecularEnvMipCount
        type: u32
      - name: SheenEnvSamplerSlot
        type: u32
      - name: SheenEnvMipCount
        type: u32
      - name: SheenELutSamplerSlot
        type: u32
      - name: CharlieLutSamplerSlot
        type: u32
  - name: SceneViewUBO
    binding: SceneViewUBO
    fields:
      - name: ViewProj
        type: mat4
      - name: ViewRotation
        type: mat3
      - name: CameraPosition
        type: vec3
      - name: CameraNear
        type: float
      - name: CameraFar
        type: float
      - name: LightCount
        type: u32
      - name: LightSlot
        type: u32
      - name: UseSceneLightsRender
        type: u32
      - name: EnvIntensity
        type: float
      - name: Exposure
        type: float
      - name: EnvRotation
        type: mat3
      - name: BackgroundBlur
        type: float
      - name: WorldOpacity
        type: float
      - name: Ibl
        type: IblSamplers
      - name: InteractionMode
        type: InteractionMode
      - name: EditElement
        type: Element
      - name: IsTransforming
        type: u32
      - name: PendingPivot
        type: vec3
      - name: PendingTranslation
        type: vec3
      - name: PendingRotation
        type: quat
        default: "1, 0, 0, 0"
      - name: PendingScale
        type: vec3
      - name: ScreenPixelScale
        type: float
      - name: ViewportSize
        type: vec2
      - name: FaceFirstTriSlot
        type: u32
      - name: BoneDeformSlot
        type: u32
      - name: ArmatureDeformSlot
        type: u32
      - name: MorphDeformSlot
        type: u32
      - name: MorphWeightsSlot
        type: u32
      # Motion blur steps read their captured model transforms through this instead of the
      # per-draw ModelSlot, so the draw data stays step-agnostic.
      - name: ModelSlotOverride
        type: u32
        default: InvalidSlot
      # Poses at the shutter's open and close, for the velocity pass. The current-frame
      # per-draw offsets index these, so only the buffer slots differ. The view moves too
      # when looking through an animated camera, so each pose carries its own projection.
      - name: PrevViewProj
        type: mat4
      - name: NextViewProj
        type: mat4
      - name: PrevModelSlot
        type: u32
      - name: NextModelSlot
        type: u32
      - name: PrevArmatureDeformSlot
        type: u32
      - name: NextArmatureDeformSlot
        type: u32
      - name: PrevMorphWeightsSlot
        type: u32
      - name: NextMorphWeightsSlot
        type: u32
      - name: VertexClassSlot
        type: u32
      - name: MaterialSlot
        type: u32
      - name: PrimitiveMaterialSlot
        type: u32
      - name: FacePrimitiveSlot
        type: u32
      - name: DrawDataSlot
        type: u32
      # Maps gl_InstanceIndex to a dense DrawData index. Identity when nothing is culled.
      - name: VisibleIndexSlot
        type: u32
        default: InvalidSlot
      - name: BoneXRay
        type: u32
      - name: NdcOffsetFactor
        type: float
      - name: TransmissionFramebufferSamplerSlot
        type: u32
        default: InvalidSlot
      - name: TransmissionFramebufferMipCount
        type: u32
      - name: UseRealTransmission
        type: u32
      - name: DebugChannel
        type: DebugChannel
  - name: SolidLight
    fields:
      - name: Direction
        type: vec3
      - name: SpecularColor
        type: vec3
      - name: DiffuseColor
        type: vec3
      - name: Wrap
        type: float
  - name: WorkspaceLights
    binding: WorkspaceLightsUBO
    fields:
      - name: Lights
        type: SolidLight[4]
      - name: AmbientColor
        type: vec3
      - name: UseSpecular
        type: u32
  - name: AxisThemeColors # Blender:Themes:Axis & Gizmo Colors
    fields:
      - name: X
        type: vec3
      - name: Y
        type: vec3
      - name: Z
        type: vec3
  - name: ViewportThemeColors # Mirrors Blender: Preferences -> Themes -> 3D Viewport -> ...
    fields:
      - name: Grid # Grid
        type: vec4
      - name: GridLine # Derived from Grid
        type: vec4
      - name: GridEmphasis # Derived from Grid
        type: vec4
      - name: GridAxisX # Derived from Grid
        type: vec3
      - name: GridAxisZ # Derived from Grid
        type: vec3
      - name: Wire # Wire
        type: vec3
      - name: WireEdit # Wire Edit
        type: vec3
      - name: ObjectActive # Active Object
        type: vec3
      - name: ObjectSelected # Object Selected
        type: vec3
      - name: Light # Light
        type: vec4
      - name: Vertex # Vertex
        type: vec3
      - name: VertexSelected # Vertex Select
        type: vec3
      - name: EdgeSelectedIncidental # Edge Selection
        type: vec3
      - name: EdgeSelected # Edge Mode Selection
        type: vec3
      - name: FaceSelectedIncidental # Face Selection
        type: vec4
      - name: FaceSelected # Face Mode Selection
        type: vec4
      - name: ElementActive # Active Vertex/Edge/Face
        type: vec4
      - name: ElementExcited # Excite mode, mouse down on excitable vertex
        type: vec4
      - name: FaceNormal # Face Normal
        type: vec3
      - name: VertexNormal # Vertex Normal
        type: vec3
      - name: BoneSolid # Bone solid fill base color
        type: vec3
      - name: BoneActive # Derived: Edit mode active+selected wire
        type: vec3
      - name: BoneActiveUnsel # Derived: Edit mode active-only wire (faded)
        type: vec3
      - name: BoneSelect # Derived: Edit mode selected wire
        type: vec3
      - name: BonePose # Pose mode selected wire
        type: vec3
      - name: BonePoseActive # Pose mode active+selected wire
        type: vec3
      - name: BonePoseActiveUnsel # Derived: Pose mode active-only wire (faded)
        type: vec3
      - name: Transform # Transform
        type: vec3
  - name: ViewportTheme
    binding: ViewportThemeUBO
    fields:
      - name: Colors
        type: ViewportThemeColors
      - name: AxisColors
        type: AxisThemeColors
      - name: EdgeWidth
        type: float
      - name: SilhouetteEdgeWidth
        type: u32
  - name: Vertex
    fields:
      - name: Position
        type: vec3
      - name: Normal
        type: vec3
      - name: Tangent
        type: vec4
      - name: Color
        type: vec4
      - name: TexCoord0
        type: vec2
      - name: TexCoord1
        type: vec2
      - name: TexCoord2
        type: vec2
      - name: TexCoord3
        type: vec2
  - name: BoneDeformVertex
    fields:
      - name: Joints
        type: uvec4
      - name: Weights
        type: vec4
  - name: MorphTargetVertex
    fields:
      - name: PositionDelta
        type: vec3
      - name: NormalDelta
        type: vec3
  - name: Transform
    fields:
      - name: P
        type: vec3
      - name: R
        type: quat
        default: "1, 0, 0, 0"
      - name: S
        type: vec3
        default: "1, 1, 1"
  - name: PunctualLight
    fields:
      - name: TransformSlotOffset
        type: SlotOffset
      - name: Range
        type: float
      - name: Color
        type: vec3
      - name: Intensity
        type: float
      - name: InnerConeCos
        type: float
      - name: OuterConeCos
        type: float
      - name: Type
        type: PunctualLightType
  - name: TextureInfo
    fields:
      - name: Slot
        type: u32
        default: InvalidSlot
      - name: TexCoord
        type: u32
      - name: UvOffset
        type: vec2
        default: 0
      - name: UvScale
        type: vec2
        default: 1
      - name: UvRotation
        type: float
        default: 0
  - name: Sheen
    fields:
      - name: ColorFactor
        type: vec3
        default: 0
      - name: RoughnessFactor
        type: float
        default: 0
      - name: ColorTexture
        type: TextureInfo
      - name: RoughnessTexture
        type: TextureInfo
  - name: Specular
    fields:
      - name: Factor
        type: float
        default: 1
      - name: ColorFactor
        type: vec3
        default: 1
      - name: Texture
        type: TextureInfo
      - name: ColorTexture
        type: TextureInfo
  - name: Transmission
    fields:
      - name: Factor
        type: float
        default: 0
      - name: Texture
        type: TextureInfo
  - name: DiffuseTransmission
    fields:
      - name: Factor
        type: float
        default: 0
      - name: ColorFactor
        type: vec3
        default: 1
      - name: Texture
        type: TextureInfo
      - name: ColorTexture
        type: TextureInfo
  - name: Volume
    fields:
      - name: ThicknessFactor
        type: float
        default: 0
      - name: AttenuationColor
        type: vec3
        default: 1
      - name: AttenuationDistance
        type: float
        default: 0
      - name: ThicknessTexture
        type: TextureInfo
  - name: Clearcoat
    fields:
      - name: Factor
        type: float
        default: 0
      - name: RoughnessFactor
        type: float
        default: 0
      - name: NormalScale
        type: float
        default: 1
      - name: Texture
        type: TextureInfo
      - name: RoughnessTexture
        type: TextureInfo
      - name: NormalTexture
        type: TextureInfo
  - name: Anisotropy
    fields:
      - name: Strength
        type: float
        default: 0
      - name: Rotation
        type: float
        default: 0
      - name: Texture
        type: TextureInfo
  - name: Iridescence
    fields:
      - name: Factor
        type: float
        default: 0
      - name: Ior
        type: float
        default: 1.3
      - name: ThicknessMinimum
        type: float
        default: 100
      - name: ThicknessMaximum
        type: float
        default: 400
      - name: Texture
        type: TextureInfo
      - name: ThicknessTexture
        type: TextureInfo
  - name: PBRMaterial
    fields:
      - name: BaseColorFactor
        type: vec4
        default: 1
      - name: EmissiveFactor
        type: vec3
        default: 0
      - name: MetallicFactor
        type: float
        default: 1
      - name: RoughnessFactor
        type: float
        default: 1
      - name: NormalScale
        type: float
        default: 1
      - name: OcclusionStrength
        type: float
        default: 1
      - name: AlphaMode
        type: MaterialAlphaMode
        default: MaterialAlphaMode::Opaque
      - name: AlphaCutoff
        type: float
        default: 0.5
      - name: DoubleSided
        type: u32
      - name: Unlit
        type: u32
      - name: Ior
        type: float
        default: 1.5
      - name: Dispersion
        type: float
        default: 0
      - name: BaseColorTexture
        type: TextureInfo
      - name: MetallicRoughnessTexture
        type: TextureInfo
      - name: NormalTexture
        type: TextureInfo
      - name: OcclusionTexture
        type: TextureInfo
      - name: EmissiveTexture
        type: TextureInfo
      - name: Sheen
        type: Sheen
      - name: Specular
        type: Specular
      - name: Transmission
        type: Transmission
      - name: DiffuseTransmission
        type: DiffuseTransmission
      - name: Volume
        type: Volume
      - name: Clearcoat
        type: Clearcoat
      - name: Anisotropy
        type: Anisotropy
      - name: Iridescence
        type: Iridescence
  - name: SelectionNode
    fields:
      - name: Depth
        type: float
      - name: Id
        type: u32
      - name: Next
        type: u32
  - name: SelectionCounters
    fields:
      - name: Count
        type: u32
      - name: Overflow
        type: u32
  - name: ElementPickCandidate
    fields:
      - name: Id
        type: u32
      - name: Depth
        type: float
      - name: DistanceSq
        type: u32
  - name: VertexTransform
    fields:
      - name: DrawDataOffset
        type: u32
      - name: VertexStateSlot
        type: u32
        default: InvalidSlot
  - name: SelectionContext
    fields:
      - name: HeadImageSlot
        type: u32
        default: InvalidSlot
      - name: NodesSlot
        type: u32
        default: InvalidSlot
      - name: CounterSlot
        type: u32
        default: InvalidSlot
      - name: NodesCapacity
        type: u32
  - name: MainDrawPushConstants
    push_constant: true
    fields:
      - name: VertexTransform
        type: VertexTransform
  - name: SelectionDrawPushConstants
    push_constant: true
    fields:
      - name: VertexTransform
        type: VertexTransform
      - name: Selection
        type: SelectionContext
  - name: SelectionElementPushConstants
    push_constant: true
    fields:
      - name: VertexTransform
        type: VertexTransform
      - name: Selection
        type: SelectionContext
      - name: Box
        type: uvec4
      - name: BoxResultSlot
        type: u32
        default: InvalidSlot
  - name: ObjectPickPushConstants
    push_constant: true
    fields:
      - name: TargetPx
        type: uvec2
      - name: Radius
        type: u32
      - name: MaxId
        type: u32
      - name: EpochInv
        type: u32
      - name: HeadImageIndex
        type: u32
      - name: SelectionNodesIndex
        type: u32
      - name: BestKeyIndex
        type: u32
      - name: SeenBitsIndex
        type: u32
  - name: ElementPickPushConstants
    push_constant: true
    fields:
      - name: TargetPx
        type: uvec2
      - name: Radius
        type: u32
      - name: HeadImageIndex
        type: u32
      - name: SelectionNodesIndex
        type: u32
      - name: ElementCandidateBufferIndex
        type: u32
  - name: BoxSelectPushConstants
    push_constant: true
    fields:
      - name: BoxMin
        type: uvec2
      - name: BoxMax
        type: uvec2
      - name: MaxId
        type: u32
      - name: HeadImageIndex
        type: u32
      - name: SelectionNodesIndex
        type: u32
      - name: BoxResultIndex
        type: u32
  - name: FrustumCullPushConstants
    push_constant: true
    fields:
      - name: CommandsSlot
        type: u32
      - name: CullEntrySlot
        type: u32
      - name: DrawDataSlot
        type: u32
      - name: VisibleIndexSlot
        type: u32
      - name: BoundsSlot
        type: u32
      - name: ModelSlot
        type: u32
      - name: EntryCount
        type: u32
      - name: CommandCount
        type: u32
      - name: Phase
        type: u32
  - name: SilhouetteEdgeDepthObjectPushConstants
    push_constant: true
    fields:
      - name: SilhouetteSamplerIndex
        type: u32
  # MotionScale.y is negative, which un-inverts the next-motion the velocity pass stores backward.
  - name: MotionBlurTilesFlattenPushConstants
    push_constant: true
    fields:
      - name: VelocitySamplerSlot
        type: u32
        default: InvalidSlot
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
      - name: MotionScale
        type: vec2
  - name: MotionBlurTilesDilatePushConstants
    push_constant: true
    fields:
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
  - name: MotionBlurGatherPushConstants
    push_constant: true
    fields:
      - name: DepthSamplerSlot
        type: u32
        default: InvalidSlot
      - name: VelocitySamplerSlot
        type: u32
        default: InvalidSlot
      - name: ColorSamplerSlot
        type: u32
        default: InvalidSlot
      - name: TileImageSlot
        type: u32
        default: InvalidSlot
      - name: TileIndirectionSlot
        type: u32
        default: InvalidSlot
      - name: MotionScale
        type: vec2
      - name: DepthScale
        type: float
      - name: NoiseOffset
        type: float
  - name: UpdateSelectionStatePushConstants
    push_constant: true
    fields:
      - name: BitsetSlot
        type: u32
      - name: BitsetOffset
        type: u32
      - name: StateSlot
        type: u32
      - name: StateOffset
        type: u32
      - name: ElementCount
        type: u32
      - name: ActiveHandle
        type: u32
      - name: EdgeMode
        type: u32
  - name: SilhouetteEdgeColorPushConstants
    push_constant: true
    fields:
      - name: Manipulating
        type: u32
      - name: ObjectSamplerIndex
        type: u32
      - name: ActiveObjectId
        type: u32
