      - name: Alpha
      - name: Occlusion
      - name: Emissive
      - name: BaseColor
      - name: Metallic
      - name: Roughness
      - name: ClearcoatFactor
      - name: ClearcoatRoughness
      - name: ClearcoatNormal
      - name: SheenColor
      - name: SheenRoughness
      - name: SpecularFactor
      - name: SpecularColor
      - name: TransmissionFactor
      - name: VolumeThickness
      - name: DiffuseTransmissionFactor
      - name: DiffuseTransmissionColor
      - name: IridescenceFactor
      - name: IridescenceThickness
      - name: AnisotropyStrength
      - name: AnisotropyDirection
  # Corner shading-normal source, carried in a corner-class value's top two bits.
  # Vertex reads the smooth vertex normal and Face reads the face normal.
  # Seam reads a sector normal indexed by the value's low 30 bits.
  - name: CornerClass
    type: u32
    values:
      - name: Vertex
      - name: Face
      - name: Seam
  # Bit layout of a corner-class value: the CornerClass tag above the seam index.
  # Uniform meshes store no class buffer.
  # UniformFaceOffset in DrawData.CornerClassOffset means every corner classifies Face.
  # InvalidOffset there means every corner classifies Vertex.
  - name: CornerClassEncoding
    type: u32
    values:
      - name: TagShift
        value: 30
      - name: IndexMask
        value: 0x3fffffffu
      - name: UniformFaceOffset
        value: 0xfffffffeu
  # Bit layout of a fan-adjacency item: the loop position above the face index.
  # Vertex and seam fans gather one item per incident face.
  # Each item contributes the face's unit normal weighted by its corner angle (Blender's weighting).
  # Bounds: 4.2M faces per mesh, face valence up to 1024.
  - name: FanItemEncoding
    type: u32
    values:
      - name: LoopShift
        value: 22
      - name: FaceMask
        value: 0x3fffffu
  # Flag bits carried in CullEntry::Cmd's high bits. KeepOrder entries always draw, at their
  # original visible-index slot, so order-dependent (blended) batches stay deterministic.
  - name: CullFlag
    type: u32
    values:
      - name: KeepOrder
        value: 0x80000000u
structs:
  - name: SlotOffset
    fields:
      - name: Slot
        type: u32
        default: InvalidSlot
      - name: Offset
        type: u32
  - name: DrawData
    fields:
      - name: VertexSlot
        type: u32
        default: InvalidSlot
      - name: IndexSlotOffset
        type: SlotOffset
      - name: ModelSlot
        type: u32
        default: InvalidSlot
      - name: FirstInstance
        type: u32
      - name: ObjectIdSlot
        type: u32
        default: InvalidSlot
      - name: CornerClassOffset
        type: u32
        default: InvalidOffset
      # Sparse authored corner-normal layer.
      # The mask offset holds a (presence word, exclusive rank) pair per 32 mesh corners.
      # The normal offset holds one packed offset per present corner.
      # CornerBase is the draw's first corner within its mesh, locating a range draw in the masks.
      - name: CustomCornerMaskOffset
        type: u32
        default: InvalidOffset
      - name: CustomCornerNormalOffset
        type: u32
        default: InvalidOffset
      - name: CornerBase
        type: u32
      # Composed sector normal per seam corner, indexed by a Seam class value's low bits.
      - name: BaseSeamNormalOffset
        type: u32
        default: InvalidOffset
      - name: CornerTangentOffset
        type: u32
        default: InvalidOffset
      - name: CornerColorOffset
        type: u32
        default: InvalidOffset
      - name: CornerUvOffsets
        type: u32[4]
        default: InvalidOffset
      - name: FaceIdOffset
        type: u32
      # Derived face normal per face, indexed by face id. The base copy mirrors the face arena.
      - name: BaseFaceNormalOffset
        type: u32
        default: InvalidOffset
      - name: VertexCountOrHeadImageSlot
        type: u32
      - name: ElementIdOffset
        type: u32
      - name: ElementStateSlotOffset
        type: SlotOffset
      - name: EdgeSharpnessOffset
        type: u32
        default: InvalidOffset
      - name: InstanceStateSlot
        type: u32
        default: InvalidSlot
      - name: HasPendingVertexTransform
        type: u32
      - name: PrimaryEditInstanceIndex
        type: u32
        default: InvalidOffset
      - name: VertexOffset
        type: u32
      - name: BoneDeformOffset
        type: u32
        default: InvalidOffset
      - name: ArmatureDeformOffset
        type: u32
        default: InvalidOffset
      - name: MorphDeformOffset
        type: u32
        default: InvalidOffset
      - name: MorphWeightsOffset
        type: u32
        default: InvalidOffset
      - name: MorphTargetCount
        type: u32
      # Authored morph shading: corner normals compose from base normals plus weighted authored deltas.
      # Edit mode builds no deform slots, so edit-mode draws (including drags) derive normals.
      - name: MorphShadingAuthored
        type: u32
      # Current-pose vertex positions in mesh-local space, with the derived per-vertex and seam-sector normals alongside.
      - name: PosedPositionOffset
        type: u32
        default: InvalidOffset
      - name: PosedVertexNormalOffset
        type: u32
        default: InvalidOffset
      - name: PosedSeamNormalOffset
        type: u32
        default: InvalidOffset
      - name: PosedFaceNormalOffset
        type: u32
        default: InvalidOffset
      - name: VertexClassOffset
        type: u32
        default: InvalidOffset
      - name: PrimitiveMaterialOffset
        type: u32
        default: InvalidOffset
      - name: FacePrimitiveOffset
        type: u32
        default: InvalidOffset
  # One entry per draw-list DrawData element, for the frustum cull pass. Cmd is the entry's indirect
  # command index, with CullFlag bits in its high bits. Base is the absolute draw-list index of the
  # command's first entry, where its visible-index remap region begins.
  - name: CullEntry
    fields:
      - name: Cmd
        type: u32
      - name: Base
        type: u32
  # One entry per normal-derive dispatch item.
  # Entries without a posed range read base positions from the vertex arena.
  # The output offsets index the dispatch's push-constant output slots.
  - name: NormalDeriveEntry
    fields:
      - name: PosedPositionOffset
        type: u32
        default: InvalidOffset
      - name: Vertices
        type: SlotOffset
      - name: FaceIndices
        type: SlotOffset
      - name: VertexCount
        type: u32
      # Vertex-fan CSR range start: (VertexCount + 1) item-start offsets, then FanItemEncoding items.
      - name: VertexAdjacencyOffset
        type: u32
      # Seam-sector CSR range start: (SeamCount + 1) item-start offsets, then FanItemEncoding items.
      - name: SeamFanOffset
        type: u32
      - name: SeamCount
        type: u32
      # Face fan ranges: per-face first-triangle offsets in the face arena, bounded by TriangleCount.
      - name: FaceDataOffset
        type: u32
      - name: FaceCount
        type: u32
      - name: TriangleCount
        type: u32
      - name: VertexNormalOffset
        type: u32
      - name: SeamNormalOffset
        type: u32
      - name: FaceNormalOffset
        type: u32
  - name: IblSamplers
    fields:
      - name: DiffuseEnvSamplerSlot
        type: u32
      - name: SpecularEnvSamplerSlot
        type: u32
      - name: BrdfLutSamplerSlot
        type: u32
      - name: SpecularEnvMipCount
        type: u32
      - name: SheenEnvSamplerSlot
