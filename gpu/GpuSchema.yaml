      - name: CornerTangentSlot
        type: u32
      - name: CornerColorSlot
        type: u32
      - name: CornerUvSlot
        type: u32
      - name: EdgeSharpnessSlot
        type: u32
      - name: CornerClassSlot
        type: u32
      - name: CustomCornerMaskSlot
        type: u32
      - name: CustomCornerNormalSlot
        type: u32
      - name: BaseSeamNormalSlot
        type: u32
      # Derived base normals: a vec3 per vertex-arena slot and per face-arena slot, indexed by the draw's vertex and face offsets.
      - name: BaseVertexNormalSlot
